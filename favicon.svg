<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Blue circle background -->
  <circle cx="16" cy="16" r="16" fill="#2563eb"/>

  <!-- Outer ring -->
  <circle cx="16" cy="15" r="10" fill="none" stroke="white" stroke-width="2.2"/>
  <!-- Middle ring -->
  <circle cx="16" cy="15" r="6.2" fill="none" stroke="white" stroke-width="2"/>
  <!-- Center dot -->
  <circle cx="16" cy="15" r="2.5" fill="white"/>

  <!-- Arrow / tick going up-right -->
  <polyline points="20,10 24,6 24,10" fill="none" stroke="#93c5fd" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="16" y1="15" x2="24" y2="6" stroke="#93c5fd" stroke-width="1.8" stroke-linecap="round"/>
</svg>
